<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleta Reciclável Pro</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold mb-4 text-green-600">Registro de Coleta</h2>
        
        <div class="space-y-4">
            <input type="text" id="produto" placeholder="Produto (ex: PET)" class="w-full p-2 border rounded">
            <input type="number" id="quantidade" placeholder="Quantidade (un/fardos)" class="w-full p-2 border rounded">
            <input type="number" id="peso" placeholder="Peso em Kilos (kg)" class="w-full p-2 border rounded">
            
            <button onclick="enviarDados()" id="btnEnviar" class="w-full bg-green-500 text-white p-3 rounded font-bold hover:bg-green-600">
                ENVIAR COLETA
            </button>
            
            <button onclick="fecharDia()" class="w-full bg-gray-800 text-white p-2 rounded mt-10">
                FECHAR DIA (RELATÓRIO)
            </button>
        </div>

        <div id="status" class="mt-4 text-sm text-center text-gray-600"></div>
    </div>

    <script>
        const WEB_APP_URL = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI";

        async function enviarDados() {
            const btn = document.getElementById('btnEnviar');
            const status = document.getElementById('status');
            const data = {
                produto: document.getElementById('produto').value,
                quantidade: document.getElementById('quantidade').value,
                peso: document.getElementById('peso').value,
                action: 'add'
            };

            if(!data.produto || !data.peso) return alert("Preencha Produto e Peso!");

            btn.disabled = true;
            status.innerText = "Enviando...";

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(data)
                });
                status.innerText = `Registrado: ${data.quantidade} de ${data.produto} (${data.peso}kg)`;
                document.querySelectorAll('input').forEach(i => i.value = '');
            } catch (e) {
                status.innerText = "Erro ao enviar.";
            } finally {
                btn.disabled = false;
            }
        }

        function fecharDia() {
            window.open(WEB_APP_URL + "?action=report", "_blank");
        }
    </script>
</body>
</html>
