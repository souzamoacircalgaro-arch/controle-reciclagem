<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta Inteligente</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* Estilo para parecer app de iPhone */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .ios-card { border-radius: 2rem; }
        .ios-input { background: #f2f2f7; border-radius: 1rem; border: 2px solid transparent; transition: 0.3s; }
        .ios-input:focus { border-color: #10b981; background: white; outline: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        
        <!-- Header Moderno -->
        <header class="bg-white p-8 pb-10 rounded-b-[3rem] shadow-sm border-b border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <span class="bg-green-100 text-green-700 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Ativo</span>
                <i class="fas fa-circle-nodes text-green-500 text-xl"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Gestão de <span class="text-green-600">Coleta</span></h1>
            <p class="text-gray-400 text-sm mt-2 font-medium" id="data_display"></p>
        </header>

        <!-- Formulário em Cartão -->
        <main class="px-6 -mt-8 space-y-6 flex-grow pb-10">
            
            <div class="bg-white p-8 ios-card shadow-xl shadow-gray-200/50 space-y-6">
                
                <!-- Equipe -->
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">Equipe Responsável</label>
                    <div class="relative">
                        <i class="fas fa-users absolute left-4 top-4 text-gray-300"></i>
                        <input type="text" id="equipe" placeholder="Nome da equipe" 
                               class="w-full p-4 pl-12 ios-input text-gray-700 font-semibold shadow-inner">
                    </div>
                </div>

                <!-- Produto -->
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">Detalhe do Produto</label>
                    <div class="relative">
                        <i class="fas fa-tag absolute left-4 top-4 text-gray-300"></i>
                        <input type="text" id="produto" placeholder="PET, Papelão, etc." 
                               class="w-full p-4 pl-12 ios-input text-gray-700 shadow-inner">
                    </div>
                </div>

                <!-- Grid Qtd e Peso -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">Qtd (un)</label>
                        <input type="number" id="quantidade" placeholder="0" 
                               class="w-full p-4 ios-input text-center text-lg font-bold shadow-inner">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">Peso (kg)</label>
                        <input type="number" step="0.01" id="peso" placeholder="0.00" 
                               class="w-full p-4 ios-input text-center text-lg font-bold text-green-600 shadow-inner">
                    </div>
                </div>

                <!-- Seleção de Resíduo -->
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest ml-1">Tipo de Resíduo</label>
                    <select id="tipo_residuo" 
                            class="w-full p-4 bg-green-50 border-none rounded-2xl text-green-700 font-bold text-center appearance-none shadow-sm cursor-pointer">
                        <option value="Reciclável">♻️ Reciclável</option>
                        <option value="Orgânico">🍎 Orgânico</option>
                    </select>
                </div>

                <!-- Botão Principal -->
                <button onclick="registrar()" id="btn_reg"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-5 rounded-2xl shadow-lg shadow-green-200 active:scale-95 transition-all text-lg flex items-center justify-center gap-3">
                    <i class="fas fa-plus-circle"></i> REGISTRAR
                </button>

            </div>

            <!-- Botão Secundário -->
            <button onclick="fechar()" 
                    class="w-full bg-gray-100 hover:bg-gray-200 text-gray-500 font-bold py-4 rounded-2xl transition-all text-xs flex items-center justify-center gap-2">
                <i class="fas fa-file-invoice"></i> FECHAR DIA E GERAR RELATÓRIO
            </button>

            <!-- Feedback -->
            <div id="status" class="text-center text-sm font-bold h-6"></div>

        </main>
    </div>

    <script>
        const hoje = new Date();
        document.getElementById('data_display').innerText = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

        function registrar() {
            const status = document.getElementById('status');
            const equipe = document.getElementById('equipe').value;
            
            if(!equipe) {
                status.className = "text-red-500";
                status.innerText = "⚠️ Preencha a equipe";
                return;
            }

            status.className = "text-blue-500 animate-pulse";
            status.innerText = "Sincronizando dados...";
            
            setTimeout(() => {
                status.className = "text-green-600";
                status.innerText = "✅ Coleta registrada!";
                // Limpar campos
                ['produto', 'peso', 'quantidade'].forEach(id => document.getElementById(id).value = '');
                setTimeout(() => status.innerText = "", 3000);
            }, 1200);
        }

        function fechar() {
            if(confirm("Deseja gerar o relatório diário agora?")) {
                alert("Enviando relatório para o seu e-mail...");
            }
        }
    </script>
</body>
</html>
