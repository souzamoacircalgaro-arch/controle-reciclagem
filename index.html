<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Coleta</title>
    <!-- Substituído CDN pesado por Tailwind Play (apenas para demo) e FontAwesome corrigido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style type="text/tailwindcss">
        @layer components {
            .ios-input { @apply bg-[#f2f2f7] rounded-2xl h-[55px] pl-12 font-semibold w-full outline-none focus:ring-2 ring-green-500 transition-all; }
            .btn-green { @apply bg-[#22c55e] text-white rounded-3xl h-[60px] font-extrabold text-lg w-full active:scale-95 active:opacity-90 transition-all shadow-lg; }
            .icon-container { @apply absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg; }
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="p-6 bg-white text-black">

    <div class="max-w-md mx-auto space-y-6">
        <header class="pt-4">
            <h1 class="text-4xl font-black tracking-tight">Gestão de Coleta</h1>
            <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Sistema Ativo</p>
        </header>

        <form id="formColeta" class="space-y-4" onsubmit="event.preventDefault(); registrar();">
            <div class="space-y-1">
                <label for="equipe" class="text-[10px] font-black uppercase tracking-widest ml-1">Equipe Responsável</label>
                <div class="relative">
                    <span class="icon-container"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="equipe" placeholder="Nome da Equipe" class="ios-input" required>
                </div>
            </div>

            <div class="space-y-1">
                <label for="produto" class="text-[10px] font-black uppercase tracking-widest ml-1">Detalhe do Produto</label>
                <div class="relative">
                    <span class="icon-container"><i class="fa-solid fa-box"></i></span>
                    <input type="text" id="produto" placeholder="O que foi coletado?" class="ios-input">
                </div>
            </div>

            <div class="flex gap-4">
                <div class="flex-1 space-y-1">
                    <label for="peso" class="text-[10px] font-black uppercase tracking-widest ml-1">Peso (kg)</label>
                    <input type="number" id="peso" step="0.01" placeholder="0.00" class="ios-input text-center pl-0" required>
                </div>
                <div class="flex-1 space-y-1">
                    <label for="tipo" class="text-[10px] font-black uppercase tracking-widest ml-1">Tipo</label>
                    <div class="relative">
                        <select id="tipo" class="ios-input appearance-none pl-4">
                            <option value="Reciclável">Reciclável</option>
                            <option value="Orgânico">Orgânico</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-green uppercase mt-4">Arquivar Registro</button>
        </form>

        <div class="flex gap-2">
            <button onclick="limparHistorico()" class="bg-gray-100 text-gray-500 px-4 py-2 rounded-xl font-bold text-xs flex-1">Limpar Tudo</button>
            <button onclick="window.open('#', '_blank')" class="bg-gray-100 text-gray-500 px-4 py-2 rounded-xl font-bold text-xs flex-1">Ver Planilha</button>
        </div>

        <section class="pt-6">
            <h3 class="text-2xl font-black mb-4">Histórico Hoje</h3>
            <div id="historico" class="space-y-0 text-gray-400 font-medium italic">
                Aguardando primeira postagem...
            </div>
        </section>
    </div>

    <script>
        // Carregar dados ao abrir
        window.onload = () => {
            const salvo = localStorage.getItem('historico_coleta');
            if(salvo) {
                document.getElementById('historico').innerHTML = salvo;
                document.getElementById('historico').classList.remove('italic');
            }
        };

        function registrar() {
            const equipe = document.getElementById('equipe').value;
            const peso = document.getElementById('peso').value;
            const tipo = document.getElementById('tipo').value;
            const hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            const hist = document.getElementById('historico');
            if(hist.innerText.includes("Aguardando")) {
                hist.innerHTML = "";
                hist.classList.remove('italic');
            }
            
            const novoItem = `
                <div class="flex justify-between items-center py-4 border-b border-gray-100 transition-all">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-gray-400 font-bold uppercase">${hora}</span>
                        <span class="font-bold text-black">${equipe}</span>
                    </div>
                    <div class="text-right">
                        <span class="block text-[10px] font-black ${tipo === 'Reciclável' ? 'text-green-500' : 'text-orange-500'} uppercase">${tipo}</span>
                        <span class="font-black text-black">${peso}kg</span>
                    </div>
                </div>`;
            
            hist.innerHTML = novoItem + hist.innerHTML;
            localStorage.setItem('historico_coleta', hist.innerHTML);

            // Reset campos específicos
            document.getElementById('peso').value = '';
            document.getElementById('produto').value = '';
        }

        function limparHistorico() {
            if(confirm("Deseja apagar o histórico local?")) {
                localStorage.removeItem('historico_coleta');
                location.reload();
            }
        }
    </script>
</body>
</html>
