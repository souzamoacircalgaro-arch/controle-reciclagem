<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta Pro Automática</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8fafc; }
        .btn-action { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 1rem; border-radius: 1.2rem; font-weight: 700; font-size: 1.1rem; transition: 0.2s; }
        .btn-action:active { transform: scale(0.97); opacity: 0.9; }
        input, select { font-size: 1.05rem !important; font-weight: 600; border-radius: 0.8rem !important; border: 1px solid #e2e8f0 !important; }
    </style>
</head>
<body class="p-4 sm:p-6">

    <div class="max-w-md mx-auto space-y-5 pb-12">
        
        <!-- Cabeçalho de Status -->
        <div class="text-center py-2">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight italic">Gestão de Coleta</h1>
            <div id="status_box" class="flex items-center justify-center gap-2 mt-1 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <span id="status_dot" class="w-2.5 h-2.5 bg-amber-400 rounded-full animate-pulse shadow-sm"></span>
                <span id="status_text">Aguardando Postagem</span>
            </div>
        </div>

        <!-- Formulário de Entrada -->
        <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-slate-100 space-y-4">
            <div class="relative">
                <i class="fa-solid fa-users absolute left-4 top-4 text-slate-300 text-sm"></i>
                <input type="text" id="equipe" placeholder="Equipe Responsável" class="w-full p-3 pl-11 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
            </div>
            
            <div class="relative">
                <i class="fa-solid fa-tags absolute left-4 top-4 text-slate-300 text-sm"></i>
                <input type="text" id="produto" placeholder="Detalhe do Produto" class="w-full p-3 pl-11 bg-slate-50 outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="relative">
                    <i class="fa-solid fa-weight-scale absolute left-4 top-4 text-slate-300 text-sm"></i>
                    <input type="number" id="peso" placeholder="Peso (kg)" class="w-full p-3 pl-11 bg-slate-50 outline-none text-emerald-700 font-extrabold">
                </div>
                <select id="tipo" class="p-3 bg-emerald-50 text-emerald-800 font-bold outline-none appearance-none text-center border-emerald-100">
                    <option value="Reciclável">♻️ Reciclável</option>
                    <option value="Orgânico">🍎 Orgânico</option>
                </select>
            </div>
        </div>

        <!-- Painel de Ações -->
        <div class="space-y-3 pt-2">
            
            <!-- REGISTRO COM CAPTURA AUTOMÁTICA DE HORA -->
            <button onclick="registrarColeta()" class="btn-action bg-slate-900 text-white shadow-2xl">
                <i class="fa-solid fa-cloud-arrow-up text-sky-400 text-base"></i>
                Arquivar Registro (Auto-Hora)
            </button>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="resetar()" class="btn-action bg-white border-2 border-rose-500 text-rose-500 text-sm">
                    <i class="fa-solid fa-trash-can text-sm"></i> Resetar
                </button>
                <button onclick="baixarCSV()" class="btn-action bg-white border-2 border-emerald-600 text-emerald-600 text-sm">
                    <i class="fa-solid fa-file-csv text-sm"></i> Baixar CSV
                </button>
            </div>

            <button onclick="window.open('https://google.com', '_blank')" class="btn-action bg-white border border-sky-400 text-sky-500 mt-2 text-xs font-bold uppercase tracking-tighter">
                <i class="fa-solid fa-table-list text-sm"></i> Abrir Planilha Google
            </button>
        </div>

        <!-- Histórico Automático -->
        <div class="pt-4">
            <h3 class="text-sm font-black text-slate-800 border-l-4 border-emerald-500 pl-3 mb-3 uppercase tracking-wider">Logs da Coleta (Automático)</h3>
            <div class="grid grid-cols-3 text-center text-[9px] font-black text-slate-400 uppercase border-b border-slate-100 pb-2">
                <span>Horário</span>
                <span>Tipo</span>
                <span>Peso</span>
            </div>
            <div id="historico" class="text-center py-8 text-slate-300 italic font-bold text-xs">
                Nenhuma postagem realizada hoje
            </div>
        </div>
    </div>

    <script>
        function registrarColeta() {
            const agora = new Date();
            const horaPostagem = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            const equipe = document.getElementById('equipe').value;
            const peso = document.getElementById('peso').value;
            const tipo = document.getElementById('tipo').value;

            if(!equipe || !peso) {
                alert("⚠️ Erro: Informe Equipe e Peso!");
                return;
            }

            // Atualiza Status Visual
            document.getElementById('status_dot').classList.replace('bg-amber-400', 'bg-emerald-500');
            document.getElementById('status_text').innerText = "Postado às " + horaPostagem;

            // Insere no Histórico
            const historico = document.getElementById('historico');
            if(historico.innerText.includes("Nenhuma")) historico.innerHTML = "";
            
            const novaLinha = `
                <div class="grid grid-cols-3 text-center py-3 border-b border-slate-50 text-slate-600 font-bold text-xs">
                    <span>${horaPostagem}</span>
                    <span>${tipo}</span>
                    <span>${peso}kg</span>
                </div>`;
            historico.innerHTML = novaLinha + historico.innerHTML;

            alert("✅ Arquivado automaticamente às " + horaPostagem);
        }

        function resetar() {
            if(confirm("Deseja apagar os dados da sessão?")) location.reload();
        }
    </script>
</body>
</html>
