<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta Pro</title>
    <!-- Framework de Estilo e Ícones -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8f9fa; }
        .btn-icon { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; transition: 0.2s; }
        .btn-icon:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto space-y-6">
        
        <!-- Cabeçalho de Status (Estilo o que você enviou) -->
        <div class="text-center space-y-2 py-4">
            <h2 class="text-2xl font-extrabold text-gray-800">Gestão de Coleta</h2>
            <div class="flex items-center justify-center gap-2 text-sm font-medium text-gray-500">
                <span class="w-3 h-3 bg-yellow-400 rounded-full animate-pulse"></span>
                aguardando sincronização
            </div>
        </div>

        <!-- Formulário de Entrada -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
            <input type="text" id="equipe" placeholder="👤 Equipe Responsável" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-green-500">
            <input type="text" id="produto" placeholder="📦 Detalhe do Produto" class="w-full p-4 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-green-500">
            
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="peso" placeholder="⚖️ Peso (kg)" class="p-4 bg-gray-50 rounded-2xl border-none outline-none">
                <select id="tipo" class="p-4 bg-green-50 text-green-700 font-bold rounded-2xl border-none outline-none">
                    <option value="Reciclável">♻️ Reciclável</option>
                    <option value="Orgânico">🍎 Orgânico</option>
                </select>
            </div>
        </div>

        <!-- Bloco de Botões (Idêntico à sua referência) -->
        <div class="space-y-3">
            
            <!-- Botão Principal de Registro -->
            <button onclick="registrar()" class="btn-icon w-full p-4 bg-[#0f172a] text-white rounded-2xl shadow-lg">
                <i class="fa-solid fa-cloud-arrow-up text-blue-400"></i> Registrar Coleta do Dia
            </button>

            <!-- Botão de Ajuste -->
            <button class="btn-icon w-full p-4 bg-[#ff9f1c] text-white rounded-2xl shadow-md">
                <i class="fa-solid fa-pen-fancy"></i> Ajustar Detalhes
            </button>

            <!-- Linha de Botões Secundários -->
            <div class="grid grid-cols-2 gap-3">
                <button class="btn-icon p-3 bg-white border border-red-500 text-red-500 rounded-2xl">
                    <i class="fa-solid fa-trash-can"></i> Resetar Dia
                </button>
                <button class="btn-icon p-3 bg-white border border-green-600 text-green-600 rounded-2xl">
                    <i class="fa-solid fa-file-csv"></i> Baixar CSV
                </button>
            </div>

            <!-- Botão Planilha -->
            <button class="btn-icon w-full p-3 bg-white border border-blue-400 text-blue-500 rounded-2xl text-sm">
                <i class="fa-solid fa-table-list"></i> Abrir Planilha Google
            </button>
        </div>

        <!-- Histórico (Estilo Tabela da Imagem) -->
        <div class="pt-6 space-y-4">
            <h3 class="text-xl font-bold text-gray-800">Histórico Recente</h3>
            <div class="grid grid-cols-3 text-center text-xs font-bold text-gray-400 uppercase tracking-widest pb-2 border-b">
                <span>Data</span>
                <span>Tipo</span>
                <span>Peso</span>
            </div>
            <div id="historico" class="space-y-3 text-sm text-gray-600">
                <!-- Dados entrarão aqui -->
                <div class="text-center py-4 text-gray-300 italic">Nenhum registro hoje</div>
            </div>
        </div>

    </div>

    <script>
        function registrar() {
            const status = document.querySelector('.animate-pulse');
            status.classList.replace('bg-yellow-400', 'bg-green-500');
            alert("Coleta sincronizada com sucesso!");
        }
    </script>
</body>
</html>
