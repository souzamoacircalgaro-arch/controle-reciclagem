<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta Pro</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-gray-100 min-h-screen font-sans flex items-center justify-center">

    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col overflow-hidden">
        
        <!-- Cabeçalho com Gradiente -->
        <div class="bg-gradient-to-r from-green-600 to-emerald-700 p-8 text-white shadow-lg text-center">
            <h1 class="text-3xl font-extrabold tracking-tight">Gestão de Coleta</h1>
            <p class="text-green-100 text-sm mt-2 opacity-90" id="exibir_data"></p>
        </div>

        <!-- Formulário Espaçado -->
        <div class="p-8 space-y-6 flex-grow">
            
            <!-- Equipe -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">
                    <i class="fas fa-users mr-2 text-green-500"></i>Equipe Responsável
                </label>
                <input type="text" id="equipe" placeholder="Nome da equipe..." 
                       class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-green-500 outline-none transition-all shadow-sm">
            </div>

            <!-- Detalhe do Produto -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">
                    <i class="fas fa-box mr-2 text-green-500"></i>Detalhe do Produto
                </label>
                <input type="text" id="produto" placeholder="Papelão, PET, Alumínio..." 
                       class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-green-500 outline-none transition-all shadow-sm">
            </div>

            <!-- Qtd e Peso -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">Qtd (un)</label>
                    <input type="number" id="quantidade" placeholder="0" 
                           class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">Peso (kg)</label>
                    <input type="number" step="0.01" id="peso" placeholder="0.00" 
                           class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none shadow-sm font-bold text-green-700">
                </div>
            </div>

            <!-- Tipo de Resíduo -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">Tipo de Resíduo</label>
                <select id="tipo_residuo" 
                        class="w-full p-4 bg-green-50 border-2 border-green-100 rounded-2xl text-green-700 font-bold outline-none appearance-none cursor-pointer">
                    <option value="Reciclável">♻️ Material Reciclável</option>
                    <option value="Orgânico">🍎 Resíduo Orgânico</option>
                </select>
            </div>

            <!-- Botões -->
            <div class="pt-6 space-y-4">
                <button onclick="enviarDados()" id="btnEnviar" 
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold p-5 rounded-2xl shadow-xl shadow-green-100 active:scale-95 transition-all text-lg">
                    REGISTRAR COLETA
                </button>
                
                <button onclick="fecharDia()" 
                        class="w-full bg-gray-800 text-gray-300 font-bold p-4 rounded-2xl transition-all text-xs">
                    FECHAR DIA E GERAR RELATÓRIO
                </button>
            </div>

            <div id="status" class="text-center text-sm font-bold mt-4"></div>
        </div>
    </div>

    <script>
        const hoje = new Date();
        document.getElementById('exibir_data').innerText = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        function enviarDados() {
            const status = document.getElementById('status');
            const equipe = document.getElementById('equipe').value;
            
            if(!equipe) {
                status.className = "text-red-500 italic";
                status.innerText = "⚠️ Informe a equipe responsável.";
                return;
            }
            
            status.className = "text-blue-500 animate-pulse";
            status.innerText = "⏳ Sincronizando dados...";
            
            setTimeout(() => {
                status.className = "text-green-600";
                status.innerText = "✅ Registrado com sucesso!";
                document.getElementById('produto').value = '';
                document.getElementById('peso').value = '';
            }, 1500);
        }

        function fecharDia() {
            alert("Relatório solicitado!");
        }
    </script>
</body>
</html>
