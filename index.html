<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coleta Recicláveis Pro</title>
    <!-- Tailwind CSS para design profissional -->
    <script src="https://tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100">
        <!-- Header -->
        <div class="bg-green-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Gestão de Coleta</h1>
            <p class="text-green-100 text-sm opacity-90" id="exibir_data"></p>
        </div>

        <!-- Formulário -->
        <div class="p-6 space-y-5">
            
            <!-- Campo Data (Oculto ou Readonly) -->
            <input type="hidden" id="data_coleta">

            <!-- Equipe Responsável -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Equipe Responsável</label>
                <input type="text" id="equipe" placeholder="Ex: Equipe Alfa" 
                       class="w-full p-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-green-500 transition-all outline-none">
            </div>

            <!-- Detalhe do Produto -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Detalhe do Produto</label>
                <input type="text" id="produto" placeholder="Ex: Papelão, PET, Vidro" 
                       class="w-full p-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-green-500 transition-all outline-none">
            </div>

            <!-- Grid Quantidade e Peso -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Quantidade (un)</label>
                    <input type="number" id="quantidade" placeholder="0" 
                           class="w-full p-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-green-500 transition-all outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Peso (kg)</label>
                    <input type="number" step="0.01" id="peso" placeholder="0.00" 
                           class="w-full p-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-green-500 transition-all outline-none">
                </div>
            </div>

            <!-- Tipo de Resíduo -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Tipo de Resíduo</label>
                <select id="tipo_residuo" 
                        class="w-full p-4 bg-green-50 border-2 border-green-100 rounded-2xl text-green-700 font-bold focus:ring-2 focus:ring-green-500 outline-none appearance-none">
                    <option value="Reciclável">♻️ Reciclável</option>
                    <option value="Orgânico">🍎 Orgânico</option>
                </select>
            </div>

            <!-- Botões de Ação -->
            <div class="pt-4 space-y-3">
                <button onclick="enviarDados()" id="btnEnviar" 
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-extrabold p-5 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">
                    REGISTRAR COLETA
                </button>
                
                <button onclick="fecharDia()" 
                        class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold p-4 rounded-2xl transition-all text-sm">
                    FECHAR DIA E GERAR RELATÓRIO
                </button>
            </div>

            <!-- Feedback de Status -->
            <div id="status" class="text-center text-sm font-medium min-h-[20px]"></div>
        </div>
    </div>

    <script>
        // Configuração Inicial: Data e Hora
        const dataInput = document.getElementById('data_coleta');
        const displayData = document.getElementById('exibir_data');
        const hoje = new Date();
        dataInput.value = hoje.toISOString().split('T')[0];
        displayData.innerText = hoje.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // URL do Google Script (Você colará aqui após configurar a planilha)
        const WEB_APP_URL = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI";

        async function enviarDados() {
            const btn = document.getElementById('btnEnviar');
            const status = document.getElementById('status');
            
            const dados = {
                data: dataInput.value,
                equipe: document.getElementById('equipe').value,
                produto: document.getElementById('produto').value,
                quantidade: document.getElementById('quantidade').value,
                peso: document.getElementById('peso').value,
                tipo: document.getElementById('tipo_residuo').value,
                action: 'add'
            };

            // Validação simples
            if(!dados.equipe || !dados.peso || !dados.produto) {
                status.className = "text-red-500 font-bold";
                status.innerText = "⚠️ Preencha Equipe, Produto e Peso!";
                return;
            }

            btn.disabled = true;
            status.className = "text-blue-500 animate-pulse";
            status.innerText = "⏳ Enviando para a planilha...";

            try {
                // Simulação de envio (Para funcionar real, precisa da URL do Apps Script)
                console.log("Dados enviados:", dados);
                
                // Fetch real (descomentar quando tiver a URL):
                /*
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(dados)
                });
                */

                status.className = "text-green-600 font-bold";
                status.innerText = `✅ Sucesso! ${dados.peso}kg de ${dados.tipo} registrados.`;
                
                // Limpa campos após sucesso
                document.getElementById('produto').value = '';
                document.getElementById('quantidade').value = '';
                document.getElementById('peso').value = '';
                
            } catch (e) {
                status.className = "text-red-600 font-bold";
                status.innerText = "❌ Erro de conexão!";
            } finally {
                btn.disabled = false;
            }
        }

        function fecharDia() {
            if(confirm("Deseja encerrar as coletas de hoje e enviar o relatório por e-mail?")) {
                alert("Relatório Diário solicitado! O sistema está processando as somas e enviará para seu e-mail cadastrado.");
                // Aqui você chamaria o WEB_APP_URL com a action 'report'
            }
        }
    </script>
</body>
</html>
